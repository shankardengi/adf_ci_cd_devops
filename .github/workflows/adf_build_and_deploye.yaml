name: ADF Build and Deploy
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
    build-and-deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Setup Node JS
          uses: actions/setup-node@v4
          with:
            node-version: '12.x'
        - name: validate node manager
          run: npm install 
        
        - name: Check Node js and Npm version
          run: |
            echo "Node Version: ${node -v}"
            echo "Npm Version:"
            npm -v